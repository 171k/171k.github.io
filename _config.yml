title: 171k
email: lanbuatkeje@gmail.com
description: "Cybersecurity projects, CTF challenges, forensic tools, and practical field notes by Razlan."
baseurl: "" # keep empty for root
url: "https://171k.my"
markdown: kramdown
theme: null
exclude: ["node_modules", "README.md", "scripts", "authoring", ".vscode", "Gemfile", "Gemfile.lock"]

collections:
  quacks:
    output: true
    permalink: /quacks/:name/
  ctf:
    output: true
    permalink: /ctf/:name/
    output_ext: html
  tools:
    output: true
    permalink: /tools/:title/
  books:
    output: true
    permalink: /books/:title/
  projects:
    output: true
    permalink: /projects/:title/
  certifications:
    output: true
    permalink: /certifications/:title/
  achievements:
    output: true
    permalink: /achievements/:title/

keep_files: []
include: ["_pages", "_ctf/**/*", "assets/**/*", "**/*.ani", "**/*.cur"]

defaults:
  - scope:
      path: ""
      type: "quacks"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "ctf"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "books"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "certifications"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "achievements"
    values:
      layout: "default"

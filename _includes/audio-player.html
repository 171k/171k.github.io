<audio id="background-music" preload="metadata" autoplay muted>
    <source src="/assets/mp3/bg_music.mp3" type="audio/mpeg">
</audio>
<button
    class="music-toggle"
    type="button"
    aria-label="Mute background music"
    aria-pressed="false"
    title="Mute background music">
    <i class="fas fa-volume-low" aria-hidden="true"></i>
</button>

<header>
    <div class="container">
        <a class="site-brand" href="/" aria-label="171k home">
            <span class="brand-mark" aria-hidden="true">
                <img src="/assets/images/brand/duckgun.png" alt="" width="38" height="38">
            </span>
            <span class="brand-copy">
                <strong>171k</strong>
                <small>Razlan's duck pond</small>
            </span>
        </a>
        <div class="header-controls">
            <button class="theme-toggle" type="button" aria-label="Switch to light mode" aria-pressed="false" title="Switch to light mode">
                <i class="fas fa-sun" aria-hidden="true"></i>
            </button>
            <button class="pond-toggle" type="button" aria-label="Pause pond animation" aria-pressed="false" title="Pause pond animation" hidden>
                <i class="fas fa-pause" aria-hidden="true"></i>
            </button>
            <button class="burger-toggle" type="button" onclick="toggleSidebar()" aria-label="Open menu" aria-expanded="false">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="6" width="18" height="2" fill="currentColor"/>
                    <rect x="3" y="11" width="18" height="2" fill="currentColor"/>
                    <rect x="3" y="16" width="18" height="2" fill="currentColor"/>
                </svg>
            </button>
            <form class="search-form" action="/search/" method="get" role="search">
                <input type="text" name="q" placeholder="Search..." aria-label="Search">
                <button type="submit" aria-label="Search"><i class="fas fa-search" aria-hidden="true"></i></button>
            </form>
        </div>
    </div>
</header>
<div class="sidebar-overlay" onclick="closeSidebar()"></div>
